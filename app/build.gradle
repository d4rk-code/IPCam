plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ma.ipcam'
    compileSdk 35

	buildToolsVersion "35.0.0"

    defaultConfig {
        applicationId "com.ma.ipcam"
        minSdk 10
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {}
